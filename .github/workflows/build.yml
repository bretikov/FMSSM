name: Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # 📥 stáhne kód
      - name: Checkout
        uses: actions/checkout@v4

      # 🐍 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 📦 závislosti
      - name: Install PyInstaller
        run: pip install pyinstaller

      # 🪟 Windows build
      - name: Build Windows EXE
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name fmssm_gui fmssm_gui.py

      # 🍎 macOS build (.app)
      - name: Build macOS APP
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name fmssm_gui fmssm_gui.py

      # 🍎 zip macOS app
      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r fmssm_gui-mac.zip fmssm_gui.app

      # 🔍 DEBUG – uvidíš co vzniklo
      - name: List dist
        run: ls -R dist

      # 📤 upload přímo do RELEASE
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
