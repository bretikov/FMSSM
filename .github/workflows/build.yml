name: Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyinstaller

      # Windows build
      - if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name fmssm_gui fmssm_gui.py

      # Zip Windows
      - if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive -Path dist\fmssm_gui.exe -DestinationPath dist\fmssm_gui-win.zip

      # Mac build
      - if: runner.os == 'macOS'
        run: pyinstaller --windowed --name fmssm_gui fmssm_gui.py

      # Zip Mac
      - if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r fmssm_gui-mac.zip fmssm_gui.app

      # Upload to release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
