
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller

      # ✅ Windows build
      - name: Build Windows
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --name fmssm_gui fmssm_gui.py

      # ✅ macOS build (.app)
      - name: Build macOS
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name fmssm_gui fmssm_gui.py

      # ✅ Zabal macOS .app do ZIP (důležité!)
      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r fmssm_gui-mac.zip fmssm_gui.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-windows-latest/*
            build-macos-latest/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
``
